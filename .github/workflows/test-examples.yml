name: Test examples

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  python:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Install Python environment
        run: uv sync --locked

      - name: Run Python example
        run: |
          uv run python -m compileall examples/python
          uv run python examples/python/dispatch_model.py

  julia:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: "1.12"

      - name: Install Julia environment
        run: julia --project=. -e 'using Pkg; Pkg.instantiate(); Pkg.precompile()'

      - name: Run Julia example
        run: julia --project=. examples/julia/dispatch_model.jl
